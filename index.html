<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Presentations</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono&family=DM+Serif+Display&family=DM+Sans:wght@400;500&display=swap');

  :root {
    --bg: #111318;
    --surface: #1a1d24;
    --border: rgba(148,163,184,0.12);
    --accent: #5b9bd5;
    --text: #d8dce6;
    --muted: #5e6a7a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 60px 32px;
  }

  main {
    width: 100%;
    max-width: 720px;
  }

  h1 {
    font-family: 'DM Serif Display', serif;
    font-size: 44px;
    font-weight: 400;
    margin-bottom: 32px;
  }

  h2 {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1.8px;
    color: var(--muted);
    font-weight: 400;
    margin: 32px 0 12px;
  }

  ul {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  a {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 18px 22px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    text-decoration: none;
    font-size: 16px;
    transition: border-color 0.15s, transform 0.15s;
  }
  a:hover {
    border-color: var(--accent);
    transform: translateX(4px);
  }
  a::after {
    content: '→';
    color: var(--accent);
    font-family: 'Space Mono', monospace;
  }
</style>
</head>
<body>
<main>
  <h1>Presentations</h1>
  <ul>
    <li><a href="presentations/overview/overview.html">Overview</a></li>
  </ul>

  <h2>Reports</h2>
  <ul>
    <li><a href="https://github.com/RashedIfty/LabSD/blob/main/Meeting%201/Report_Ifty_10032026.pdf" target="_blank" rel="noopener">1st Meeting Report</a></li>
    <li><a href="https://github.com/RashedIfty/LabSD/blob/main/Meeting%202/Report_Ifty_26032026.pdf" target="_blank" rel="noopener">2nd Meeting Report</a></li>
  </ul>
</main>
</body>
</html>
